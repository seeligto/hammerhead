# HeXO — Single Source of Truth for Engine Configuration
#
# This file is the authoritative source for all engine *tuning* parameters:
# eval weights, search defaults, board constants.
#
# Rust side: read at build time by hexo-engine/build.rs, codegen'd into
#            src/config_generated.rs (included by src/config.rs).
# Python side: read at import time by hexo/hexo/config.py via tomllib.
#
# Build-system metadata (dep versions, Rust edition, Python version) lives in
# the respective Cargo.toml / pyproject.toml files — Cargo cannot reference
# external TOML for those.
#
# Edit a value here, rebuild, both Rust and Python pick it up.

[engine.eval]
# Mate-class scores
mate_score = 1_000_000

# Layer 2 (WSC shape) scores — see SPEC_EVAL.md
# S0 (mate-in-one). Sized so two non-overlapping open-4s outrank any
# plausible Layer 2 sum; the fork-mate path in Layer 3 returns
# MATE_SCORE, so these are the *non-mate* upper bounds.
#
# The S1/S2 shape weights (open_3 / rhombus / arch / bone / trapezoid /
# open_2 / closed_3 / triangle) were zeroed in Phase 17 and removed
# with the detection code in Phase 20 — the ablation verdict was DROP.
# See SPEC_EVAL.md § Layer 2 history.
open_5   = 800_000
closed_5 = 500_000
open_4   = 60_000
closed_4 = 20_000

# Layer 1 (window scan) — score by count of own stones in 6-cell window.
# Index 0..=6. Index 6 maps to mate_score.
window_k_scores = [0, 1, 8, 64, 512, 4096, 1_000_000]

# Layer 1 extension factor — applied after window lookup based on the
# two cells immediately outside the 6-window:
#   both empty       → open_extension_factor
#   one empty, one O → closed_extension_factor (identity)
#   both opp/blocked → 0 (dead window)
open_extension_factor   = 4
closed_extension_factor = 1

# Layer 3 fork detection — minimum-cover-2 bonus.
# Cover ≥ 3 returns MATE; cover 2 returns this bonus.
fork_cover2_bonus = 4000

# (Phase 17 removed the advisory `tempo_weight` — the tempo term was
# dropped together with the S1/S2 contributions. See SPEC_EVAL.md
# § Tempo.)

[engine.threats]
# guard against pathological positions (worst-case all-stones-in-one-cluster)
max_s0_instances_per_player = 64

[engine.tt]
# Default size for the transposition table. Two-bucket slots (~64 bytes each);
# the size is rounded down to a power of two during construction.
default_size_mb = 64

[engine.search]
default_max_depth      = 64
default_time_ms        = 1000
default_move_radius    = 2
deadline_check_nodes   = 4096
aspiration_start_depth = 4

# Stone 1 / stone 2 time split. Bot passes the full per-turn budget twice;
# engine internally uses pct on the first call, (1 - pct) on the second.
time_stone1_pct = 0.6

# Aspiration window: initial half-width and per-failure widen factor.
# Phase 26.5 T-04: initial 50 → 100 (I-ASP found 65% first-attempt fail
# rate at depths ≥4, fail-high 40% > fail-low 25%; ±100 fits the
# observed swings within 1σ on three of four fixtures).
asp_window_initial      = 100
asp_window_widen_factor = 2

# Late move reductions. Disabled for TT / killer / S0-create / S0-block
# moves. R = lmr_reduction at depth >= lmr_min_depth, move index >= lmr_min_move_index.
lmr_min_depth        = 3
lmr_min_move_index   = 6
lmr_reduction        = 1

# Threat-only quiescence cap (plies inside qsearch).
qsearch_max_plies = 8

# Per root-path check-extension budget.
max_check_extensions = 4

# Move-generation tuning. See SPEC_ENGINE.md "Move Generation".
move_gen_inner_radius = 2     # default radius for normal search nodes

[engine.ordering]
# Move-ordering tuning. See SPEC_ENGINE.md "Ordering".
move_gen_cap        = 24            # cap returned/searched moves per node
killer_slots        = 2             # killer-move slots per ply
max_ply             = 128           # killer table size: search-tree depth cap
history_cutoff_max  = 0x00FFFFFF    # 24-bit saturation for history scores
history_decay_num   = 1             # per-root-search decay numerator
history_decay_den   = 2             # per-root-search decay denominator (1/2)

[engine.board]
# legality: any move must be within this hex-distance of some piece
max_piece_distance = 8

# zobrist: half-extent of preallocated u128 hash window
# (2*W + 1)^2 * 2 entries; W = 127 -> ~2 MB
zobrist_window = 127

[bot]
# Defaults consumed by hexo.bot.BotConfig and the CLI. Engine-side
# search defaults live in [engine.search] / [engine.tt] above.
default_time_per_move_ms = 1000
default_tt_size_mb       = 64

[bench]
# Benchmark suite defaults. See specs/SPEC_BENCHMARKS.md.
default_time_ms     = 1000
default_runs        = 3
default_games       = 5
default_max_plies   = 200
results_dir         = "benches/results"
fixtures_path       = "benches/fixtures/positions.json"
schema_version      = 1

[bench.reference]
# Reference node-count table. See specs/SPEC_BENCHMARKS.md § Reference.
# Deterministic per-fixture search at fixed depths; serves as regression
# net for any change that touches search.
fixtures   = ["empty", "single_origin", "midgame_12", "midgame_30"]
max_depth  = 8
budget_s   = 60

[bench.scaling]
# ms-time scaling table. See specs/SPEC_BENCHMARKS.md § ms-time scaling.
# (fixture, time_ms) → (depth_reached, nodes, NPS, ci95_lo, ci95_hi).
fixtures   = ["empty", "single_origin", "midgame_12", "midgame_30"]
time_ms    = [1, 10, 50, 100, 250, 500, 1000]
runs       = 5

[bench.breakdown]
# Per-function cycles breakdown. See specs/SPEC_BENCHMARKS.md
# § Per-function cycles breakdown. Estimates only; flamegraph is
# ground truth.
fixtures   = ["midgame_12", "midgame_30"]
depth      = 4

[bench.quick]
# Inner-loop feedback tier (~5-15s). See SPEC_BENCHMARKS.md § Bench tiers.
default_fixture   = "midgame_12"
default_time_ms   = 500
default_runs      = 3

[bench.perf]
# Pre-commit tier (~30-60s). See SPEC_BENCHMARKS.md § Bench tiers.
fixtures   = ["midgame_12", "midgame_30"]
time_ms    = [250, 1000]
runs       = 5

[bench.vs]
# Parallel match harness (Phase 17). See SPEC_BENCHMARKS.md
# § Parallel match harness. Python-only (subprocess driver).
default_n_workers       = 0          # 0 = auto: cpu_count() - 2
max_tt_mb_per_worker    = 64
default_time_ms         = 500
default_n_games         = 50

[promote]
# Promotion harness — see specs/SPEC_ROADMAP.md § Phase 11.
# Python-only (subprocess driver). Rust does not consume these.
default_n_games           = 200
default_time_ms_per_stone = 1000
default_test              = "sprt"     # "sprt" | "wilson" | "raw"
sprt_elo_low              = 0.0
sprt_elo_high             = 5.0
sprt_alpha                = 0.05
sprt_beta                 = 0.05
wilson_min_lower          = 0.50
raw_min_winrate           = 0.60
color_balance             = true
opening_diversity         = false
bestref_path              = ".bestref"
worktree_path             = ".worktree-best"
default_max_plies         = 400
